[tool_alias]
agent-browser = "npm:agent-browser"
claude = "npm:@anthropic-ai/claude-code"
claude_swarm = "gem:claude_swarm"
codex = "npm:@openai/codex"
copilot = "github:aws/copilot-cli"
dedoc = "toiletbril/dedoc"
gemini = "npm:@google/gemini-cli"
mole = "github:davrodpin/mole"
qmd = "npm:@tobilu/qmd"
rainfrog = "github:achristmascarl/rainfrog"
ir = "github:vlwkaos/ir"
rbw = "github:doy/rbw"
scc = "github:boyter/scc"
sq = "github:neilotoole/sq"
tmux-thumbs = "github:fcsonline/tmux-thumbs"
tv = "github:alexpasmantier/television"
typos-lsp = "github:tekumara/typos-lsp"
usage = "https://github.com/jdx/mise-usage.git"
gws = "github:googleworkspace/cli"
xq = "github:sibprogrammer/xq"
code-review-graph = "pipx:code-review-graph"
opendataloader-pdf = "pipx:opendataloader-pdf"
eks-node-viewer = "github:awslabs/eks-node-viewer"

[tasks."yarn:latest"]
description = "set yarn version to latest"
run = "yarn set version latest"

[tasks."setup:devops"]
description = "setup devops tools"
run = """
#!/usr/bin/env bash
mise use -C $HOME --yes \
    terraform \
    nova \
    kubectl \
    awscli \
    github-cli \
    krew \
    helm \
    k9s \
    cargo:kdash
"""

[tasks."setup:ruby"]
description = "setup ruby depdenencies"
run = """
#!/usr/bin/env bash
case ${OSTYPE}
in
    darwin*)
        brew install openssl readline zlib
        ;;
    *)
        sudo apt-get install -y libssl-dev libreadline-dev zlib1g-dev
        ;;
esac
"""

[tasks."setup:ir"]
run = """
#!/usr/bin/env bash
set -euo pipefail
echo -e '# logseq 등록'
ir collection add logseq-pages ~/Documents/logseq/pages 2>/dev/null || true
ir collection add logseq-journals ~/Documents/logseq/journals 2>/dev/null || true
echo -e '# 한국어 전처리기 설치'
ir preprocessor install ko
ir preprocessor bind ko logseq-pages
ir preprocessor bind ko logseq-journals
echo -e '# BM25 인덱싱'
ir update logseq-pages
ir update logseq-journals
echo -e '# 벡터 임베딩'
ir embed logseq-pages
ir embed logseq-journals
echo -e '# 데몬 시작'
ir daemon start
"""

[tasks."docker"]
description = "start mise docker"
run = "docker run -it jdxcode/mise"
