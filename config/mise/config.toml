[settings]
# disable_tools = ["python"]
experimental = true  # with python virtualenv activation
idiomatic_version_file_enable_tools = ["ruby"]
auto_install = false
env_shell_expand = true  # Opt in early to the future default behavior.

[env]

[tools]
usage = "latest"  # mise usage
watchexec = "latest"  # mise watch -t
neovim = "latest"
tree-sitter = "latest"
fzf = "latest"
ripgrep = "latest"
zoxide = "0.9.8"
delta = "latest"
fd = "latest"
bat = "latest"
dust = "latest"
jq = "latest"
yq = "latest"
xq = "latest"
just = "latest"
ruby = "latest"
sq = "latest"
sops = "latest"
ghq = "latest"
gh = "latest"
tmux-thumbs = "latest"
qmd = "latest"
ir = { version = "latest", asset_pattern = "ir-*" }

