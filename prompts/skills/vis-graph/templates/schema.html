<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB Schema (ERD)</title>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<style>
  :root {
    --bg: #ffffff; --bg-sidebar: #f5f5f5; --bg-card: #ffffff;
    --text: #212121; --text-secondary: #757575; --border: #e0e0e0;
    --accent: #1976D2; --accent-hover: #1565C0;
    --danger: #E53935; --warn: #F57C00;
    --input-bg: #ffffff; --input-border: #bdbdbd;
    --badge-bg: #e3f2fd; --badge-text: #1565c0;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a2e; --bg-sidebar: #16213e; --bg-card: #1a1a2e;
      --text: #e0e0e0; --text-secondary: #9e9e9e; --border: #333;
      --accent: #64B5F6; --accent-hover: #42A5F5;
      --danger: #EF5350; --warn: #FFA726;
      --input-bg: #0f3460; --input-border: #555;
      --badge-bg: #0f3460; --badge-text: #64b5f6;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  #sidebar { width: 280px; min-width: 280px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
  #sidebar h2 { padding: 16px; font-size: 16px; border-bottom: 1px solid var(--border); }
  .sidebar-section { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .sidebar-section h3 { font-size: 12px; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 8px; letter-spacing: 0.5px; }

  /* Search */
  #search { width: 100%; padding: 8px 12px; border: 1px solid var(--input-border); border-radius: 6px; background: var(--input-bg); color: var(--text); font-size: 13px; outline: none; }
  #search:focus { border-color: var(--accent); }

  /* Filters */
  .filter-list { max-height: 200px; overflow-y: auto; }
  .filter-item { display: flex; align-items: center; gap: 8px; padding: 3px 0; font-size: 13px; cursor: pointer; }
  .filter-item input { accent-color: var(--accent); }
  .filter-color { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .filter-actions { display: flex; gap: 8px; margin-bottom: 6px; }
  .filter-actions button { font-size: 11px; color: var(--accent); background: none; border: none; cursor: pointer; padding: 0; }
  .filter-actions button:hover { text-decoration: underline; }

  /* Stats */
  .stat-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
  .stat-value { font-weight: 600; color: var(--accent); }
  .stat-warn { color: var(--danger); font-weight: 600; }

  /* Detail panel (right) */
  #detail-panel { width: 400px; min-width: 400px; background: var(--bg-sidebar); border-left: 1px solid var(--border); display: none; flex-direction: column; overflow-y: auto; padding: 16px; }
  #detail-panel.active { display: flex; }
  #detail-panel-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
  #node-name { font-size: 14px; font-weight: 600; word-break: break-all; flex: 1; }
  #detail-close { background: none; border: none; font-size: 20px; color: var(--text-secondary); cursor: pointer; padding: 0 0 0 8px; line-height: 1; }
  #detail-close:hover { color: var(--text); }
  #node-meta { font-size: 12px; color: var(--text-secondary); margin-bottom: 12px; }
  .detail-section-label { font-size: 11px; text-transform: uppercase; color: var(--text-secondary); font-weight: 600; letter-spacing: 0.5px; margin: 12px 0 6px; }
  .dep-list { list-style: none; font-size: 12px; max-height: 160px; overflow-y: auto; }
  .dep-list li { padding: 2px 0; cursor: pointer; color: var(--accent); }
  .dep-list li:hover { text-decoration: underline; }

  /* Columns table */
  .columns-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 8px; }
  .columns-table th { text-align: left; padding: 4px 6px; border-bottom: 1px solid var(--border); color: var(--text-secondary); font-weight: 600; font-size: 11px; text-transform: uppercase; }
  .columns-table td { padding: 3px 6px; border-bottom: 1px solid var(--border); }
  .columns-table tr:last-child td { border-bottom: none; }
  .columns-table td:nth-child(3),
  .columns-table td:nth-child(4),
  .columns-table td:nth-child(5),
  .columns-table th:nth-child(3),
  .columns-table th:nth-child(4),
  .columns-table th:nth-child(5) { text-align: center; width: 30px; }

  /* Toolbar */
  #toolbar { position: absolute; top: 12px; right: 12px; display: flex; gap: 6px; z-index: 10; transition: right 0.15s; }
  .tool-btn { padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-card); color: var(--text); font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .tool-btn:hover { border-color: var(--accent); color: var(--accent); }
  .tool-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .badge { display: inline-block; padding: 1px 6px; border-radius: 10px; background: var(--badge-bg); color: var(--badge-text); font-size: 11px; font-weight: 600; margin-left: 4px; }
  .badge.danger { background: #fbe9e7; color: var(--danger); }
  .badge.orphan { background: #fff3e0; color: var(--warn); }
  .badge.implicit { background: #e8eaf6; color: #5c6bc0; }
  @media (prefers-color-scheme: dark) {
    .badge.danger { background: #3e1a1a; }
    .badge.orphan { background: #3e2e1a; }
    .badge.implicit { background: #1a1a3e; }
  }

  /* Graph container */
  #graph-container { flex: 1; position: relative; }
  #graph { width: 100%; height: 100%; }

  /* Legend */
  #legend { position: absolute; bottom: 12px; left: 12px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 11px; z-index: 10; max-width: 480px; }
  #legend h4 { margin-bottom: 6px; font-size: 12px; }
  .legend-items { display: flex; flex-wrap: wrap; gap: 8px; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-line { width: 20px; height: 0; border-top: 2px solid var(--text-secondary); display: inline-block; }
  .legend-line.dashed { border-top-style: dashed; }

  /* Toast */
  #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 8px 16px; border-radius: 6px; font-size: 13px; background: var(--accent); color: #fff; opacity: 0; transition: opacity 0.3s; z-index: 100; pointer-events: none; }
  #toast.show { opacity: 1; }

  /* Copy path button */
  .copy-btn { display: inline-block; margin-top: 8px; padding: 4px 10px; font-size: 11px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg-card); color: var(--accent); cursor: pointer; }
  .copy-btn:hover { border-color: var(--accent); background: var(--accent); color: #fff; }
</style>
</head>
<body>

<div id="sidebar">
  <h2>DB Schema (ERD)</h2>

  <div class="sidebar-section">
    <h3>Search</h3>
    <input type="text" id="search" placeholder="Filter tables..." />
  </div>

  <div class="sidebar-section">
    <h3>Schemas</h3>
    <div class="filter-actions">
      <button onclick="toggleAllFilters('schema-filters', true)">All</button>
      <button onclick="toggleAllFilters('schema-filters', false)">None</button>
    </div>
    <div class="filter-list" id="schema-filters"></div>
  </div>

  <div class="sidebar-section">
    <h3>Table Types</h3>
    <div class="filter-actions">
      <button onclick="toggleAllFilters('type-filters', true)">All</button>
      <button onclick="toggleAllFilters('type-filters', false)">None</button>
    </div>
    <div class="filter-list" id="type-filters"></div>
  </div>

  <div class="sidebar-section">
    <h3>Statistics</h3>
    <div id="stats"></div>
  </div>

</div>

<div id="graph-container">
  <div id="toolbar">
    <button class="tool-btn" id="btn-reset" title="Reset view">Reset</button>
    <button class="tool-btn active" id="btn-physics" title="Toggle physics">Physics</button>
    <button class="tool-btn" id="btn-color" title="Toggle color mode">Color: Type</button>
    <button class="tool-btn" id="btn-orphans" title="Highlight orphan tables">Orphans</button>
    <button class="tool-btn active" id="btn-implicit" title="Toggle implicit FK edges">Implicit</button>
  </div>
  <div id="graph"></div>
  <div id="legend"><h4>Legend</h4><div class="legend-items" id="legend-items"></div></div>
</div>

<div id="detail-panel">
  <div id="detail-panel-header">
    <span id="node-name"></span>
    <button id="detail-close" onclick="closeDetailPanel()">&times;</button>
  </div>
  <div id="node-meta"></div>
  <div class="detail-section-label">Columns</div>
  <div id="node-columns"></div>
  <div class="detail-section-label">References</div>
  <ul class="dep-list" id="node-references"></ul>
  <div class="detail-section-label">Referenced by</div>
  <ul class="dep-list" id="node-referencedby"></ul>
  <button class="copy-btn" id="btn-copy-path" onclick="copySelectedNode()">Copy Path</button>
</div>

<div id="toast"></div>

<script>
// --- DATA INJECTION POINT ---
const GRAPH_DATA = {{GRAPH_DATA}};

// --- Theme colors ---
const COLORS = (() => {
  return {
    highlightNode: '#FFD600',
    highlightEdge: '#FF6F00',
    dimEdge: '#88888844',
    fadedEdge: '#88888815',
    orphanNode: '#F57C00',
    implicitEdge: '#7986CB',
    defaultNode: '#90A4AE',
  };
})();

function escapeHTML(str) {
  return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

const TYPE_ABBREV = {
  'character varying': 'varchar',
  'timestamp with time zone': 'timestamptz',
  'timestamp without time zone': 'timestamp',
  'time with time zone': 'timetz',
  'time without time zone': 'time',
  'double precision': 'float8',
  'character': 'char',
  'bit varying': 'varbit',
};
function shortType(t) { return TYPE_ABBREV[t] || t; }

// --- State ---
let network, allNodes, allEdges, nodesDataset, edgesDataset;
let physicsEnabled = true;
let orphansHighlighted = false;
let implicitVisible = true;
let selectedNode = null;
let colorMode = GRAPH_DATA.groupBy || 'type'; // 'type' or 'schema'

function getNodeColor(node) {
  const type = node._type ?? node.type;
  const schema = node._schema ?? node.group;
  if (colorMode === 'type' && GRAPH_DATA.types && GRAPH_DATA.types[type]) {
    return GRAPH_DATA.types[type].color;
  }
  return GRAPH_DATA.groups[schema]?.color || COLORS.defaultNode;
}

// --- Init ---
function init() {
  const totalTables = GRAPH_DATA.nodes.length;

  const nodes = GRAPH_DATA.nodes.map(n => {
    const c = getNodeColor(n);
    return {
      id: n.id, label: n.label, title: n.title,
      _schema: n.group, _type: n.type, _columns: n.columns || [],
      font: { color: '#fff', strokeWidth: 2, strokeColor: '#000' },
      shape: 'dot',
      size: Math.max(8, Math.min(30, (n.size || 1) * 3 + 5)),
      color: { background: c, border: c, highlight: { background: COLORS.highlightNode, border: '#FFA000' } },
      hidden: false,
    };
  });

  const edges = GRAPH_DATA.edges.map(e => ({
    ...e,
    _implicit: !!e.implicit,
    color: { color: COLORS.dimEdge, highlight: COLORS.highlightEdge },
    smooth: { type: 'cubicBezier', forceDirection: 'none', roundness: 0.4 },
    dashes: !!e.implicit,
    width: 1,
    hidden: false,
  }));

  allNodes = nodes;
  allEdges = edges;
  nodesDataset = new vis.DataSet(nodes);
  edgesDataset = new vis.DataSet(edges);

  const container = document.getElementById('graph');
  network = new vis.Network(container, { nodes: nodesDataset, edges: edgesDataset }, {
    physics: {
      enabled: true,
      solver: 'forceAtlas2Based',
      forceAtlas2Based: { gravitationalConstant: -30, centralGravity: 0.005, springLength: 160, springConstant: 0.015, damping: 0.7 },
      stabilization: { iterations: Math.min(300, totalTables * 4), fit: true },
    },
    interaction: { hover: true, tooltipDelay: 100, navigationButtons: false, keyboard: false },
    layout: { improvedLayout: true },
    edges: { font: { size: 9, color: '#999', strokeWidth: 0 } },
  });

  network.on('click', onNodeClick);
  network.on('doubleClick', onNodeDoubleClick);
  network.once('stabilizationIterationsDone', () => {
    network.setOptions({ physics: { enabled: false } });
    physicsEnabled = false;
    document.getElementById('btn-physics').classList.remove('active');
  });
  network.on('dragStart', () => {
    if (!physicsEnabled) network.setOptions({ physics: { enabled: true, stabilization: false } });
  });
  network.on('dragEnd', () => {
    if (!physicsEnabled) {
      setTimeout(() => { network.setOptions({ physics: { enabled: false } }); }, 300);
    }
  });

  renderSchemaFilters();
  renderTypeFilters();
  renderStats();
  renderLegend();
  setupToolbar();
  setupSearch();
}

// --- Schema Filters ---
function renderSchemaFilters() {
  const container = document.getElementById('schema-filters');
  const groups = Object.keys(GRAPH_DATA.groups).sort();
  container.innerHTML = groups.map(g => {
    const count = allNodes.filter(n => n._schema === g).length;
    const c = GRAPH_DATA.groups[g].color;
    return `<label class="filter-item">
      <input type="checkbox" checked data-group="${escapeHTML(g)}" />
      <span class="filter-color" style="background:${c}"></span>
      ${escapeHTML(g)} <span class="badge">${count}</span>
    </label>`;
  }).join('');
  container.querySelectorAll('input').forEach(cb => cb.addEventListener('change', applyFilters));
}

// --- Type Filters ---
function renderTypeFilters() {
  const container = document.getElementById('type-filters');
  const types = GRAPH_DATA.types ? Object.keys(GRAPH_DATA.types).sort() : [];
  container.innerHTML = types.map(t => {
    const count = allNodes.filter(n => n._type === t).length;
    const c = GRAPH_DATA.types[t].color;
    return `<label class="filter-item">
      <input type="checkbox" checked data-type="${escapeHTML(t)}" />
      <span class="filter-color" style="background:${c}"></span>
      ${escapeHTML(t)} <span class="badge">${count}</span>
    </label>`;
  }).join('');
  container.querySelectorAll('input').forEach(cb => cb.addEventListener('change', applyFilters));
}

function toggleAllFilters(containerId, checked) {
  const cbs = document.querySelectorAll(`#${containerId} input[type=checkbox]`);
  cbs.forEach(cb => { cb.checked = checked; });
  applyFilters();
}

function applyFilters() {
  const checkedGroups = new Set();
  document.querySelectorAll('#schema-filters input:checked').forEach(cb => checkedGroups.add(cb.dataset.group));
  const checkedTypes = new Set();
  document.querySelectorAll('#type-filters input:checked').forEach(cb => checkedTypes.add(cb.dataset.type));
  const raw = document.getElementById('search').value.toLowerCase().trim();
  // Support OR search: "admin | user" or "admin|user"
  const terms = raw ? raw.split(/\s*\|\s*/).filter(Boolean) : [];

  const updates = [];
  nodesDataset.forEach(n => {
    const orig = allNodes.find(an => an.id === n.id);
    const matchGroup = checkedGroups.has(orig?._schema);
    const matchType = checkedTypes.has(orig?._type || 'other');
    const idLower = n.id.toLowerCase();
    const labelLower = (n.label || '').toLowerCase();
    const matchSearch = terms.length === 0 || terms.some(t => idLower.includes(t) || labelLower.includes(t));
    updates.push({ id: n.id, hidden: !matchGroup || !matchType || !matchSearch });
  });
  nodesDataset.update(updates);
}

// --- Stats ---
function renderStats() {
  const s = GRAPH_DATA.stats;
  const maxRef = s.maxReferenced || { table: '-', count: 0 };
  document.getElementById('stats').innerHTML = `
    <div class="stat-row"><span>Tables</span><span class="stat-value">${s.totalTables}</span></div>
    <div class="stat-row"><span>Foreign Keys</span><span class="stat-value">${s.totalFKs}</span></div>
    <div class="stat-row"><span>Implicit FKs</span><span class="${s.implicitFKs > 0 ? 'stat-warn' : 'stat-value'}">${s.implicitFKs}</span></div>
    <div class="stat-row"><span>Orphan Tables</span><span class="${s.orphanTables > 0 ? 'stat-warn' : 'stat-value'}">${s.orphanTables}</span></div>
    <div class="stat-row"><span>Avg Columns</span><span class="stat-value">${s.avgColumns}</span></div>
    <div class="stat-row"><span>Indexes</span><span class="stat-value">${s.totalIndexes}</span></div>
    <div class="stat-row"><span>Most Referenced</span><span class="stat-value" title="${escapeHTML(maxRef.table)}">${escapeHTML(maxRef.table)} (${maxRef.count})</span></div>
  `;
}

// --- Legend ---
function renderLegend() {
  const container = document.getElementById('legend-items');
  let html = '';

  if (colorMode === 'type' && GRAPH_DATA.types) {
    html = Object.entries(GRAPH_DATA.types)
      .sort(([a],[b]) => a.localeCompare(b))
      .map(([name, t]) =>
        `<span class="legend-item"><span class="filter-color" style="background:${t.color}"></span>${escapeHTML(name)}</span>`
      ).join('');
  } else {
    html = Object.entries(GRAPH_DATA.groups)
      .sort(([a],[b]) => a.localeCompare(b))
      .map(([name, g]) =>
        `<span class="legend-item"><span class="filter-color" style="background:${g.color}"></span>${escapeHTML(name)}</span>`
      ).join('');
  }

  // Always show edge type legend
  html += `<span class="legend-item"><span class="legend-line"></span>Explicit FK</span>`;
  html += `<span class="legend-item"><span class="legend-line dashed"></span>Implicit FK</span>`;

  container.innerHTML = html;
}

// --- Recolor nodes ---
function recolorNodes() {
  const updates = [];
  nodesDataset.forEach(n => {
    const orig = allNodes.find(an => an.id === n.id);
    if (!orig) return;
    const c = getNodeColor(orig);
    updates.push({ id: n.id, color: { background: c, border: c, highlight: { background: COLORS.highlightNode, border: '#FFA000' } } });
  });
  nodesDataset.update(updates);
  renderLegend();
}

// --- Toolbar ---
function setupToolbar() {
  document.getElementById('btn-reset').addEventListener('click', () => {
    network.fit({ animation: { duration: 500 } });
    clearHighlight();
    closeDetailPanel();
  });

  document.getElementById('btn-physics').addEventListener('click', function() {
    physicsEnabled = !physicsEnabled;
    this.classList.toggle('active', physicsEnabled);
    if (physicsEnabled) {
      network.setOptions({ physics: { enabled: true, stabilization: { iterations: 100 } } });
    } else {
      network.stopSimulation();
      network.setOptions({ physics: { enabled: false } });
    }
  });

  document.getElementById('btn-color').addEventListener('click', function() {
    colorMode = colorMode === 'type' ? 'schema' : 'type';
    this.textContent = 'Color: ' + (colorMode === 'type' ? 'Type' : 'Schema');
    recolorNodes();
  });

  document.getElementById('btn-orphans').addEventListener('click', function() {
    orphansHighlighted = !orphansHighlighted;
    this.classList.toggle('active', orphansHighlighted);
    if (orphansHighlighted) highlightOrphans();
    else clearHighlight();
  });

  document.getElementById('btn-implicit').addEventListener('click', function() {
    implicitVisible = !implicitVisible;
    this.classList.toggle('active', implicitVisible);
    toggleImplicitEdges();
  });
}

// --- Search ---
function setupSearch() {
  let debounce;
  document.getElementById('search').addEventListener('input', () => {
    clearTimeout(debounce);
    debounce = setTimeout(applyFilters, 200);
  });
}

// --- Orphan detection & highlighting ---
function getOrphanNodeIds() {
  const connectedNodes = new Set();
  edgesDataset.forEach(e => {
    if (!e.hidden) {
      connectedNodes.add(e.from);
      connectedNodes.add(e.to);
    }
  });
  const orphans = new Set();
  nodesDataset.forEach(n => {
    if (!n.hidden && !connectedNodes.has(n.id)) {
      orphans.add(n.id);
    }
  });
  return orphans;
}

function highlightOrphans() {
  const orphans = getOrphanNodeIds();

  const nodeUpdates = [];
  nodesDataset.forEach(n => {
    if (orphans.has(n.id)) {
      nodeUpdates.push({ id: n.id, opacity: 1.0, color: { background: COLORS.orphanNode, border: COLORS.orphanNode } });
    } else {
      nodeUpdates.push({ id: n.id, opacity: 0.15 });
    }
  });
  nodesDataset.update(nodeUpdates);

  const edgeUpdates = [];
  edgesDataset.forEach(e => {
    edgeUpdates.push({ id: e.id, color: { color: COLORS.fadedEdge }, width: 1 });
  });
  edgesDataset.update(edgeUpdates);
}

// --- Implicit FK toggle ---
function toggleImplicitEdges() {
  const updates = [];
  edgesDataset.forEach(e => {
    if (e._implicit) {
      updates.push({ id: e.id, hidden: !implicitVisible });
    }
  });
  edgesDataset.update(updates);
}

// --- Node interaction ---
function onNodeClick(params) {
  clearHighlight();
  if (params.nodes.length === 0) {
    closeDetailPanel();
    return;
  }
  selectedNode = params.nodes[0];
  highlightConnected(selectedNode);
  showNodeDetail(selectedNode);
}

function closeDetailPanel() {
  document.getElementById('detail-panel').classList.remove('active');
  selectedNode = null;
}

function onNodeDoubleClick(params) {
  if (params.nodes.length > 0) {
    const nodeId = params.nodes[0];
    network.focus(nodeId, { scale: 1.5, animation: { duration: 500 } });
    copyToClipboard(nodeId);
  }
}

// --- Clipboard & Toast ---
function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(() => {
    showToast('Copied: ' + text);
  }).catch(() => {
    showToast('Copy failed');
  });
}

function copySelectedNode() {
  if (selectedNode) copyToClipboard(selectedNode);
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

function highlightConnected(nodeId) {
  const connEdges = edgesDataset.get().filter(e => !e.hidden && (e.from === nodeId || e.to === nodeId));
  const connNodes = new Set([nodeId]);
  connEdges.forEach(e => { connNodes.add(e.from); connNodes.add(e.to); });

  const nodeUpdates = [];
  nodesDataset.forEach(n => {
    nodeUpdates.push({ id: n.id, opacity: connNodes.has(n.id) ? 1.0 : 0.15 });
  });
  nodesDataset.update(nodeUpdates);

  const edgeUpdates = [];
  edgesDataset.forEach(e => {
    const connected = connEdges.some(ce => ce.id === e.id);
    edgeUpdates.push({ id: e.id, color: { color: connected ? COLORS.highlightEdge : COLORS.fadedEdge }, width: connected ? 2 : 1 });
  });
  edgesDataset.update(edgeUpdates);
}

function clearHighlight() {
  const nodeUpdates = [];
  nodesDataset.forEach(n => {
    const orig = allNodes.find(an => an.id === n.id);
    const c = orig ? getNodeColor(orig) : COLORS.defaultNode;
    nodeUpdates.push({ id: n.id, opacity: 1.0, color: { background: c, border: c } });
  });
  nodesDataset.update(nodeUpdates);

  const edgeUpdates = [];
  edgesDataset.forEach(e => {
    edgeUpdates.push({ id: e.id, color: { color: COLORS.dimEdge, highlight: COLORS.highlightEdge }, width: 1 });
  });
  edgesDataset.update(edgeUpdates);
}

function showNodeDetail(nodeId) {
  const detail = document.getElementById('detail-panel');
  detail.classList.add('active');
  document.getElementById('node-name').textContent = nodeId;

  const orig = allNodes.find(n => n.id === nodeId);
  const metaEl = document.getElementById('node-meta');
  if (orig) {
    const typeColor = GRAPH_DATA.types?.[orig._type]?.color || '';
    metaEl.innerHTML = `<span class="filter-color" style="background:${typeColor};display:inline-block;vertical-align:middle;margin-right:4px"></span>${escapeHTML(orig._type || 'unknown')} / ${escapeHTML(orig._schema || '')}`;
  } else {
    metaEl.textContent = '';
  }

  // Columns table
  const columnsContainer = document.getElementById('node-columns');
  if (orig && orig._columns && orig._columns.length > 0) {
    const isAudit = n => /_(at|by)$/.test(n);
    const sorted = [...orig._columns].sort((a, b) => {
      if (a.pk !== b.pk) return a.pk ? -1 : 1;
      const ia = !!a.idx, ib = !!b.idx;
      if (ia !== ib) return ia ? -1 : 1;
      const aa = isAudit(a.name), ab = isAudit(b.name);
      if (aa !== ab) return aa ? 1 : -1;
      return a.name.localeCompare(b.name);
    });
    let html = '<table class="columns-table"><thead><tr><th>Name</th><th>Type</th><th>PK</th><th>IDX</th><th>Null</th></tr></thead><tbody>';
    sorted.forEach(col => {
      html += `<tr><td>${escapeHTML(col.name)}</td><td>${escapeHTML(shortType(col.type))}</td><td>${col.pk ? '*' : ''}</td><td>${col.idx ? '*' : ''}</td><td>${col.nullable ? '*' : ''}</td></tr>`;
    });
    html += '</tbody></table>';
    columnsContainer.innerHTML = html;
  } else {
    columnsContainer.innerHTML = '<span style="font-size:12px;color:var(--text-secondary)">No columns</span>';
  }

  // References (tables this one references)
  const outEdges = edgesDataset.get().filter(e => e.from === nodeId);
  const references = outEdges.map(e => e.to);
  renderDepList('node-references', references);

  // Referenced by (tables that reference this one)
  const inEdges = edgesDataset.get().filter(e => e.to === nodeId);
  const referencedBy = inEdges.map(e => e.from);
  renderDepList('node-referencedby', referencedBy);
}

function renderDepList(elementId, tables) {
  const ul = document.getElementById(elementId);
  ul.innerHTML = '';
  if (tables.length === 0) {
    ul.innerHTML = '<li style="color:var(--text-secondary);cursor:default">None</li>';
    return;
  }
  tables.forEach(t => {
    const li = document.createElement('li');
    li.textContent = t;
    li.addEventListener('click', () => focusNode(t));
    ul.appendChild(li);
  });
}

function focusNode(nodeId) {
  network.focus(nodeId, { scale: 1.2, animation: { duration: 400 } });
  network.selectNodes([nodeId]);
  highlightConnected(nodeId);
  showNodeDetail(nodeId);
}

// --- Start ---
init();
</script>
</body>
</html>
